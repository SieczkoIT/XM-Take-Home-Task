<div class="favourites">
  @if (favouritePhotos().length === 0) {
    <div class="favourites__empty">
      <mat-icon class="favourites__empty-icon">favorite_border</mat-icon>
      <h2 class="favourites__empty-title">No favourites yet</h2>
      <p class="favourites__empty-subtitle">Go to Photos and click on an image to save it here.</p>
    </div>
  } @else {
    <app-photo-grid
      [photos]="favouritePhotos()"
      [showOverlay]="false"
      (cardClicked)="onPhotoClicked($event)"
    />
  }
</div>
