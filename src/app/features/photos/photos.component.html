<div class="photos">
  <div class="photos__grid">
    @for (photo of photos(); track photo.id) {
      <app-photo-card
        [photo]="photo"
        [isFavourite]="favouriteIds().has(photo.id)"
        (cardClicked)="onAddToFavourites($event)"
      />
    }
  </div>

  @if (isLoading()) {
    <div class="photos__loader">
      <mat-spinner diameter="48" />
    </div>
  }

  <div class="photos__sentinel" appInfiniteScroll (scrolled)="onScrolled()"></div>
</div>
