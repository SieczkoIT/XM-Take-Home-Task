<div class="photos page-wrapper">
  <app-photo-grid
    [photos]="photos()"
    [favoriteIds]="favoriteIds()"
    (cardClicked)="onAddToFavorites($event)"
  />

  @if (isLoading()) {
    <div class="photos__loader">
      <mat-spinner diameter="48" />
    </div>
  }

  @if (hasError()) {
    <div class="photos__error">
      <mat-icon class="photos__error-icon">wifi_off</mat-icon>
      <p class="photos__error-text">Failed to load photos</p>
      <button mat-stroked-button (click)="retry()">Try again</button>
    </div>
  }

  <div class="photos__sentinel" appInfiniteScroll (scrolled)="onScrolled()"></div>
</div>
