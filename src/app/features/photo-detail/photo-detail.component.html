<div class="photo-detail page-wrapper">
  <div class="photo-detail__image-wrapper">
    <img class="photo-detail__image" [src]="photo.fullSizeUrl" [alt]="'Photo ' + photo.id" />
  </div>

  <div class="photo-detail__actions">
    <button mat-stroked-button [disabled]="!isFavorite()" (click)="removeFromFavorites()">
      <mat-icon>favorite</mat-icon>
      Remove from favorites
    </button>
  </div>
</div>
